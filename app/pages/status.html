    <style>
      html, body { height: 100%; }
      html { font-size: 100%; }

      *, *::before, *::after { box-sizing: border-box; }
      body { box-sizing: border-box; }
      * { font-family: 'DM Sans', system-ui, sans-serif; }

      .gradient-text {
        background: linear-gradient(135deg, #F97316, #FB923C);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .glass-card {
        background: rgba(10, 10, 10, 0.6);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .noise-bg::before {
        content: '';
        position: fixed;
        inset: 0;
        opacity: .03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 1;
      }

      .btn-primary {
        background: linear-gradient(135deg, #f97316, #ea580c);
        transition: all 0.2s ease;
      }

      .btn-primary:hover {
        filter: brightness(1.05);
        transform: translateY(-1px);
      }

      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 18px rgba(249, 115, 22, 0.18); }
        50% { box-shadow: 0 0 30px rgba(249, 115, 22, 0.34); }
      }

      .node-current { animation: pulse-glow 2s ease-in-out infinite; }

      @keyframes live-dot-pulse {
        0%, 100% { opacity: 0.9; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.18); }
      }

      .live-dot {
        display: inline-block;
        animation: live-dot-pulse 1.8s ease-in-out infinite;
        filter: drop-shadow(0 0 6px rgba(249, 115, 22, 0.35));
      }

      .node-card { transition: all 0.2s ease; }
      .node-card:hover { transform: translateY(-2px); }

      /* Locked nodes are still clickable (we show messaging instead of blocking clicks). */
      .node-card.locked { cursor: pointer; opacity: 0.75; }

      /* Allows hash navigation to land nicely below the header/topbar. */
      .phase-section { scroll-margin-top: 140px; }

      .phase-connector {
        background: linear-gradient(90deg, transparent, rgba(249, 115, 22, 0.28), transparent);
      }

      /* Hide/show the detail panel by changing the grid template (Tailwind CDN can't see dynamic classes). */
      @media (min-width: 1024px) {
        .status-grid-collapsed { grid-template-columns: 1fr; }
        .status-grid-expanded { grid-template-columns: 1fr 35rem; }
      }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #1e293b; }
      ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #64748b; }

      @media print {
        .no-print { display: none !important; }
        body { background: white !important; }
      }
    </style>

      function getIcon(name, className = 'w-5 h-5') {
        const body = icons[name] || icons.document;
        return `<svg class="${className}" fill="none" stroke="currentColor" viewBox="0 0 24 24">${body}</svg>`;
      }

      function getStatusStyles(status) {
        const styles = {
          blocked: { bg: 'bg-red-500/10', border: 'border-red-500/30', pill: 'bg-red-500/15 text-red-300 border border-red-500/20', pillText: 'Blocked', text: 'text-red-300' },
          complete: { bg: 'bg-emerald-500/10', border: 'border-emerald-500/30', pill: 'bg-emerald-500/15 text-emerald-200 border border-emerald-500/20', pillText: 'Complete', text: 'text-emerald-200' },
          current: { bg: 'bg-orange-500/10', border: 'border-orange-400/30', pill: 'bg-orange-400/10 text-orange-200 border border-orange-400/20', pillText: 'Current', text: 'text-orange-200' },
          locked: { bg: 'bg-slate-950/30', border: 'border-white/10', pill: 'bg-slate-800/60 text-slate-300 border border-white/10', pillText: 'Locked', text: 'text-slate-400' },
          ready: { bg: 'bg-slate-950/30', border: 'border-white/10', pill: 'bg-blue-500/10 text-blue-200 border border-blue-500/20', pillText: 'Ready', text: 'text-slate-200' }
        };
        return styles[status] || styles.locked;
      }

      function getLinearSteps() {
        return [
          ...projectData.phases.flatMap((p) => p.steps),
          ...projectData.crossPhaseSteps
        ];
      }

      function getPrerequisiteStep(stepId) {
        const steps = getLinearSteps();
        const index = steps.findIndex((s) => s.id === stepId);
        if (index > 0) return steps[index - 1];
        return null;
      }

      function lockAllSteps() {
        projectData.phases.forEach((phase) => {
          phase.steps.forEach((s) => { s.status = 'locked'; });
        });

        // Demo start: Intake is the only unlocked step.
        const intake = projectData.phases.flatMap((p) => p.steps).find((s) => s.id === 'intake');
        if (intake) intake.status = 'ready';

        // Support remains available.
        projectData.crossPhaseSteps.forEach((s) => {
          s.status = (s.id === 'support-ticket') ? 'ready' : 'locked';
        });
      }

        const container = document.getElementById('phase-indicators');
        if (!container) return;

        let html = '';

        projectData.phases.forEach((phase, index) => {
          const isComplete = phase.steps.every((s) => s.status === 'complete');
          const isCurrent = phase.steps.some((s) => s.status === 'current');

          let statusClass = 'bg-slate-950/30 text-slate-400 border border-white/10';
          if (isComplete) statusClass = 'bg-emerald-500/10 text-emerald-200 border border-emerald-500/20';
          else if (isCurrent) statusClass = 'bg-orange-500/10 text-orange-200 border border-orange-400/20';

          html += `
            <div class="flex items-center ${index < projectData.phases.length - 1 ? 'flex-1' : ''}">
              <button
                type="button"
                data-phase-target="phase-${phase.id}"
                class="px-3 py-1.5 rounded-full text-xs font-medium ${statusClass} whitespace-nowrap hover:opacity-90 transition"
              >
                Phase ${phase.id}: ${phase.name}
              </button>
              ${index < projectData.phases.length - 1 ? `<div class="flex-1 h-0.5 mx-2 phase-connector rounded-full"></div>` : ''}
            </div>
          `;
        });

        container.innerHTML = html;

        // Enable phase click scroll
        container.querySelectorAll('[data-phase-target]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const targetId = btn.getAttribute('data-phase-target');
            const el = targetId ? document.getElementById(targetId) : null;
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
        });
      }

      function renderStepNode(step) {
        const styles = getStatusStyles(step.status);
        const isLocked = step.status === 'locked';
        const isCurrent = step.status === 'current';
        const isComplete = step.status === 'complete';
        const isSelected = selectedStep === step.id;
        const isStart = step.id === 'intake';

        // Keep this call for future prerequisite-based UX, but we no longer show the gating text.
        const prerequisite = getPrerequisiteStep(step.id);
        void prerequisite;

        // For locked steps, show a brief explanation of THIS step instead of prerequisite gating text.
        const lockedMessage = isLocked
          ? (step.microcopy || step.description || 'This step will unlock when prior requirements are met.')
          : step.microcopy;

        return `
          <div
            class="node-card p-4 rounded-2xl border ${styles.border} ${styles.bg} ${isLocked ? 'locked' : 'cursor-pointer'} ${(isCurrent || isStart) ? 'node-current' : ''} ${isSelected ? 'ring-2 ring-orange-500/40' : ''} ${isStart ? 'ring-2 ring-orange-500/30' : ''}"
            data-step-id="${step.id}"
          >
            <div class="flex items-start justify-between mb-3">
              <div class="w-10 h-10 rounded-xl bg-slate-950/30 border border-white/10 flex items-center justify-center ${styles.text}">
                ${isComplete ? getIcon('check') : isLocked ? getIcon('lock') : getIcon(step.icon)}
              </div>
              <span class="px-2 py-0.5 rounded-full text-[10px] font-medium ${styles.pill}">
                ${styles.pillText}
              </span>
            </div>
            <h3 class="font-semibold text-white text-sm mb-1">${step.name}</h3>
            <p class="text-xs ${styles.text} leading-snug">${lockedMessage}</p>
          </div>
        `;
      }

      function renderMindMap() {
        const container = document.getElementById('mind-map');
        if (!container) return;

        let html = '';

        projectData.phases.forEach((phase) => {
          const phaseStatus =
            phase.steps.every((s) => s.status === 'complete') ? 'complete' :
            phase.steps.some((s) => s.status === 'current') ? 'current' :
            'locked';

          const styles = getStatusStyles(phaseStatus);

          html += `
            <div class="phase-section" id="phase-${phase.id}">
              <div class="flex items-center gap-3 mb-4">
                <div class="w-8 h-8 rounded-xl ${styles.bg} ${styles.border} border flex items-center justify-center">
                  <span class="text-sm font-bold ${styles.text}">${phase.id}</span>
                </div>
                <h2 class="text-lg font-semibold text-white">${phase.name}</h2>
              </div>

              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
                ${phase.steps.map(renderStepNode).join('')}
              </div>

              ${phase.connector ? `
                <div class="flex items-center gap-2 text-xs text-slate-500 ml-1 mb-2">
                  ${getIcon('arrow-right', 'w-4 h-4')}
                  <span class="italic">${phase.connector}</span>
                </div>
              ` : ''}
            </div>
          `;
        });

        html += `
          <div class="mt-6 pt-6 border-t border-white/10">
            <div class="flex items-center gap-2 mb-4 text-slate-400">
              <span class="text-xs uppercase tracking-wider">Cross-Phase Support</span>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
              ${projectData.crossPhaseSteps.map(renderStepNode).join('')}
            </div>
          </div>
        `;

        container.innerHTML = html;

        document.querySelectorAll('.node-card').forEach((node) => {
          node.addEventListener('click', () => selectStep(node.dataset.stepId));
        });

        if (!selectedStep) {
          const currentStep = projectData.phases.flatMap((p) => p.steps).find((s) => s.status === 'current');
          if (currentStep) selectStep(currentStep.id);
        }
      }

      function updateSelectedRings() {
        document.querySelectorAll('.node-card').forEach((node) => {
          node.classList.remove('ring-2', 'ring-orange-500/40');
          if (selectedStep && node.dataset.stepId === selectedStep) {
            node.classList.add('ring-2', 'ring-orange-500/40');
          }
        });
      }

      function selectStep(stepId) {
        // Toggle off if clicking the same step again
        if (selectedStep === stepId) {
          selectedStep = null;
          updateSelectedRings();
          renderDetailPanel();
          return;
        }

        selectedStep = stepId;
        updateSelectedRings();
        renderDetailPanel();
      }

      function findStep(stepId) {
        for (const phase of projectData.phases) {
          const found = phase.steps.find((s) => s.id === stepId);
          if (found) return found;
        }
        return projectData.crossPhaseSteps.find((s) => s.id === stepId) || null;
      }

      function renderFormContent(step) {
        const isComplete = step.status === 'complete';
        if (!step.formFields) return '';

        return `
          <div class="rounded-2xl border border-white/10 bg-slate-950/30 p-5">
            <div class="flex items-center justify-between mb-3">
              <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Form Preview</h3>
              ${isComplete ? `<span class="flex items-center gap-1 text-xs text-slate-500">${getIcon('lock', 'w-3 h-3')}Submitted</span>` : ''}
            </div>
            <div class="space-y-2">
              ${step.formFields.slice(0, 5).map((field) => `
                <div class="flex items-center gap-2 px-3 py-2 rounded-xl bg-slate-900/50 border border-white/10 ${isComplete ? 'opacity-70' : ''}">
                  <span class="w-2 h-2 rounded-full ${isComplete ? 'bg-emerald-400' : 'bg-slate-500'}"></span>
                  <span class="text-sm ${isComplete ? 'text-slate-400' : 'text-slate-300'}">${field}</span>
                  ${isComplete ? `<span class="ml-auto text-xs text-emerald-300">✓</span>` : ''}
                </div>
              `).join('')}
              ${step.formFields.length > 5 ? `<p class="text-xs text-slate-500 text-center pt-2">+${step.formFields.length - 5} more fields</p>` : ''}
            </div>
            ${isComplete ? `<p class="text-xs text-slate-500 mt-3 italic">Changes require a support request.</p>` : ''}
          </div>
        `;
      }

      function renderOperatorContent(step) {
        const statusMap = {
          blocked: { text: 'Waiting on You', class: 'text-red-200 bg-red-500/10 border border-red-500/20' },
          complete: { text: 'Complete', class: 'text-emerald-200 bg-emerald-500/10 border border-emerald-500/20' },
          current: { text: 'In Progress', class: 'text-orange-200 bg-orange-500/10 border border-orange-400/20' },
          locked: { text: 'Pending', class: 'text-slate-300 bg-slate-950/30 border border-white/10' }
        };

        const status = statusMap[step.status] || statusMap.locked;

        return `
          <div class="rounded-2xl border border-white/10 bg-slate-950/30 p-5">
            <div class="flex items-center justify-between mb-4">
              <span class="px-3 py-1 rounded-full text-xs font-medium ${status.class}">${status.text}</span>
              ${step.estimate ? `<span class="text-xs text-slate-500">Est. ${step.estimate}</span>` : ''}
            </div>

            <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Processing Checklist</h3>
            <div class="space-y-2">
              ${(step.checklist || []).map((item, index) => {
                const isItemComplete = step.status === 'complete' || (step.status === 'current' && index === 0);
                return `
                  <div class="flex items-center gap-3 px-3 py-2 rounded-xl bg-slate-900/50 border border-white/10">
                    <div class="w-5 h-5 rounded-full ${isItemComplete ? 'bg-emerald-500/10 text-emerald-200 border border-emerald-500/20' : 'bg-slate-950/30 text-slate-400 border border-white/10'} flex items-center justify-center flex-shrink-0">
                      ${isItemComplete ? getIcon('check', 'w-3 h-3') : `<span class="text-xs">${index + 1}</span>`}
                    </div>
                    <span class="text-sm ${isItemComplete ? 'text-slate-400 line-through' : 'text-slate-300'}">${item}</span>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }

      function getDynamicButtonConfig(step) {
        const isComplete = step.status === 'complete';
        const isLocked = step.status === 'locked';
        const isOperator = step.type === 'operator';
        const isSupport = step.id === 'support-ticket';

        if (isSupport) {
          return { href: '/app/pages/support.html', icon: 'support', label: 'Go To Support Page', style: 'primary' };
        }

        if (isOperator) {
          return { href: '#', icon: 'chart', label: 'View Processing Details', style: 'operator' };
        }

        const varietyMap = {
          agreement: { edit: 'Edit Agreement', view: 'View Signed Agreement' },
          'address-update': { edit: 'Edit Address Information', view: 'View Address Details' },
          'esign-2848': { edit: 'Complete eSign 2848', view: 'View eSigned 2848' },
          'exit-survey': { edit: 'Complete Exit Survey', view: 'View Survey Submission' },
          'filing-status': { edit: 'Edit Filing Status', view: 'View Filing Status' },
          intake: { edit: 'Edit Intake Form', view: 'View Intake Form' },
          offer: { edit: 'Edit Offer Details', view: 'View Offer Summary' },
          payment: { edit: 'Update Payment Method', view: 'View Payment Receipt' },
          'results-appointment': { edit: 'Await Staff Scheduling', view: 'View Scheduled Results Appointment' },
          welcome: { edit: 'Edit Welcome Info', view: 'View Welcome Responses' },
          'wet-signature-2848': { edit: 'Upload Signed 2848', view: 'View Uploaded 2848' }
        };

        const map = varietyMap[step.id] || { edit: `Edit ${step.name}`, view: `View ${step.name}` };

        if (step.id === 'results-appointment' && !isComplete) {
          return { href: step.link || '#', icon: 'lock', label: map.edit, style: 'ghost' };
        }

        if (isComplete) {
          return { href: step.link || '#', icon: 'search', label: map.view, style: 'complete' };
        }

        return {
          href: step.link || '#',
          icon: isLocked ? 'lock' : 'pencil',
          label: map.edit,
          style: isLocked ? 'ghost' : 'primary'
        };
      }

      function renderPrimaryAction(step) {
        const cfg = getDynamicButtonConfig(step);

        if (cfg.style === 'operator') {
          return `
            <button
              class="w-full py-3 px-4 rounded-xl font-semibold flex items-center justify-center gap-2 transition-all bg-slate-950/30 text-slate-300 border border-white/10 hover:bg-slate-950/40"
              data-action="noop"
              type="button"
            >
              ${getIcon(cfg.icon)}
              ${cfg.label}
            </button>
          `;
        }

        const baseClass = cfg.style === 'complete'
          ? 'bg-emerald-500/10 text-emerald-200 border border-emerald-500/20 hover:bg-emerald-500/15'
          : cfg.style === 'ghost'
            ? 'bg-slate-950/30 text-slate-300 border border-white/10 hover:bg-slate-950/40'
            : 'btn-primary text-white shadow-lg shadow-orange-500/15';

        const weightClass = cfg.style === 'ghost' ? 'font-medium' : 'font-semibold';

        return `
          <button
            class="w-full py-3 px-4 rounded-xl ${weightClass} flex items-center justify-center gap-2 transition-all ${baseClass}"
            data-action="navigate"
            data-href="${cfg.href}"
            type="button"
          >
            ${getIcon(cfg.icon)}
            ${cfg.label}
          </button>
        `;
      }

      function renderDetailBadge(step) {
        const isOperator = step.type === 'operator';
        const isSupport = step.id === 'support-ticket';
        const isStaffScheduled = step.id === 'results-appointment';

        if (isOperator) {
          return `
            <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-purple-500/10 text-purple-200 border border-purple-500/20 text-xs">
              ${getIcon('shield', 'w-3 h-3')}
              Internal Processing
            </span>
          `;
        }

        if (isStaffScheduled) {
          return `
            <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-slate-950/30 text-slate-300 border border-white/10 text-xs">
              ${getIcon('lock', 'w-3 h-3')}
              Staff Scheduled
            </span>
          `;
        }

        if (isSupport) {
          return `
            <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-orange-500/10 text-orange-200 border border-orange-400/20 text-xs">
              ${getIcon('support', 'w-3 h-3')}
              Optional — If You Need Help
            </span>
          `;
        }

        return `
          <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-orange-500/10 text-orange-200 border border-orange-400/20 text-xs">
            ${getIcon('user-group', 'w-3 h-3')}
            Action Required From You
          </span>
        `;
      }

      function renderDetailPanel() {
        const container = document.getElementById('detail-panel');
        const aside = document.getElementById('detail-aside');
        const grid = document.getElementById('status-grid');
        if (!container) return;

        // Hide the entire panel when nothing is selected.
        if (!selectedStep) {
          if (aside) aside.classList.add('hidden');
          if (grid) {
            grid.classList.remove('status-grid-expanded');
            grid.classList.add('status-grid-collapsed');
          }
          container.innerHTML = '';
          return;
        }

        if (aside) aside.classList.remove('hidden');
        if (grid) {
          grid.classList.remove('status-grid-collapsed');
          grid.classList.add('status-grid-expanded');
        }

        // IMPORTANT: single declaration only (fixes "Identifier 'step' has already been declared")
        const step = findStep(selectedStep);
        if (!step) return;

        const styles = getStatusStyles(step.status);
        const isOperator = step.type === 'operator';

        container.innerHTML = `
          <div class="detail-panel">
            <div class="flex items-start gap-4 mb-6">
              <div class="w-14 h-14 rounded-2xl ${styles.bg} ${styles.border} border flex items-center justify-center ${styles.text} flex-shrink-0">
                ${getIcon(step.icon, 'w-7 h-7')}
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <h2 class="text-xl font-bold text-white">${step.name}</h2>
                  <span class="px-2 py-0.5 rounded-full text-xs font-medium ${styles.pill}">${styles.pillText}</span>
                </div>
                ${renderDetailBadge(step)}
              </div>
            </div>

            <div class="mb-6">
              <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">What This Step Does</h3>
              <p class="text-sm text-slate-300 leading-relaxed">${step.description || ''}</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
              <div class="rounded-2xl border border-white/10 bg-slate-950/30 p-5">
                <h3 class="text-xs font-semibold text-orange-200 uppercase tracking-wider mb-3 flex items-center gap-2">
                  ${getIcon('user-group', 'w-4 h-4')}
                  What We Need From You
                </h3>
                <ul class="space-y-2">
                  ${(step.whatWeNeed || []).map((item) => `
                    <li class="flex items-start gap-2 text-sm text-slate-300">
                      <span class="w-1.5 h-1.5 rounded-full bg-orange-500 mt-1.5 flex-shrink-0"></span>
                      ${item}
                    </li>
                  `).join('')}
                </ul>
              </div>

              <div class="rounded-2xl border border-white/10 bg-slate-950/30 p-5">
                <h3 class="text-xs font-semibold text-emerald-200 uppercase tracking-wider mb-3 flex items-center gap-2">
                  ${getIcon('sparkles', 'w-4 h-4')}
                  What We Do
                </h3>
                <ul class="space-y-2">
                  ${(step.whatWeDo || []).map((item) => `
                    <li class="flex items-start gap-2 text-sm text-slate-300">
                      <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 mt-1.5 flex-shrink-0"></span>
                      ${item}
                    </li>
                  `).join('')}
                </ul>
              </div>
            </div>

            ${isOperator ? renderOperatorContent(step) : renderFormContent(step)}

            <div class="flex flex-col gap-3 mt-6">
              ${renderPrimaryAction(step)}
              <div class="flex items-center gap-3 text-xs">
                <a href="/app/pages/calendar.html" class="text-slate-400 hover:text-orange-200 transition-colors flex items-center gap-1">
                  ${getIcon('calendar', 'w-4 h-4')}
                  Calendar
                </a>
                <a href="/app/pages/files.html" class="text-slate-400 hover:text-orange-200 transition-colors flex items-center gap-1">
                  ${getIcon('document', 'w-4 h-4')}
                  Files
                </a>
              </div>
            </div>
          </div>
        `;

        wireDetailPanelActions(container);
      }

      function wireDetailPanelActions(container) {
        container.querySelectorAll('button[data-action]').forEach((btn) => {
          const action = btn.getAttribute('data-action');
          if (action !== 'navigate') return;

          btn.addEventListener('click', () => {
            const href = btn.getAttribute('data-href');
            if (!href || href === '#') return;
            window.location.href = href;
          });
        });
      }

      function applyColors() {
        const bgColor = config.background_color || defaultConfig.background_color;
        const textColor = config.text_color || defaultConfig.text_color;
        document.body.style.backgroundColor = bgColor;
        document.body.style.color = textColor;
      }

      async function onConfigChange(newConfig) {
        config = newConfig || {};
        applyColors();
      }

      function mapToCapabilities(cfg) {
        return {
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined,
          recolorables: [
            { get: () => cfg.background_color || defaultConfig.background_color, set: (value) => { cfg.background_color = value; window.elementSdk && window.elementSdk.setConfig({ background_color: value }); } },
            { get: () => cfg.primary_color || defaultConfig.primary_color, set: (value) => { cfg.primary_color = value; window.elementSdk && window.elementSdk.setConfig({ primary_color: value }); } },
            { get: () => cfg.secondary_color || defaultConfig.secondary_color, set: (value) => { cfg.secondary_color = value; window.elementSdk && window.elementSdk.setConfig({ secondary_color: value }); } },
            { get: () => cfg.surface_color || defaultConfig.surface_color, set: (value) => { cfg.surface_color = value; window.elementSdk && window.elementSdk.setConfig({ surface_color: value }); } },
            { get: () => cfg.text_color || defaultConfig.text_color, set: (value) => { cfg.text_color = value; window.elementSdk && window.elementSdk.setConfig({ text_color: value }); } }
          ]
        };
      }

      function mapToEditPanelValues(cfg) {
        return new Map([
          ['page_title', (cfg && cfg.page_title) || defaultConfig.page_title],
          ['welcome_message', (cfg && cfg.welcome_message) || defaultConfig.welcome_message]
        ]);
      }

      async function injectPartial(slotComment, url) {
        const html = document.documentElement;
        const walker = document.createTreeWalker(html, NodeFilter.SHOW_COMMENT, null);
        let node;
        while ((node = walker.nextNode())) {
          if (String(node.nodeValue || '').trim() === slotComment) {
            const res = await fetch(url, { method: 'GET' });
            if (!res.ok) throw new Error(`Partial HTTP ${res.status}: ${url}`);
            const wrap = document.createElement('div');
            wrap.innerHTML = await res.text();

            const frag = document.createDocumentFragment();
            while (wrap.firstChild) frag.appendChild(wrap.firstChild);
            node.parentNode.insertBefore(frag, node);
            node.parentNode.removeChild(node);
            return;
          }
        }
      }

      async function initShell() {
        try {
          await injectPartial('APP_SIDEBAR', '/app/partials/sidebar.html');
          await injectPartial('APP_TOPBAR', '/app/partials/topbar.html');
        } catch (err) {
          console.warn('Shell partial injection failed:', err);
        }
      }

      // Tiny smoke tests. These run in the browser console.
      function assert(condition, message) {
        if (!condition) throw new Error(message);
      }

      function runTests() {
        // DOM exists
        assert(!!document.getElementById('mind-map'), 'Expected #mind-map to exist');
        assert(!!document.getElementById('detail-panel'), 'Expected #detail-panel to exist');
        assert(!!document.getElementById('detail-aside'), 'Expected #detail-aside to exist');
        assert(!!document.getElementById('status-grid'), 'Expected #status-grid to exist');

        // Selection behavior
        selectedStep = null;
        renderDetailPanel();
        assert(document.getElementById('detail-aside').classList.contains('hidden'), 'Expected detail aside hidden when no selection');

        selectStep('intake');
        assert(selectedStep === 'intake', 'Expected selectStep to set selection');
        assert(!document.getElementById('detail-aside').classList.contains('hidden'), 'Expected detail aside visible when selected');

        selectStep('intake');
        assert(selectedStep === null, 'Expected selectStep to toggle off when selecting same step');
        assert(document.getElementById('detail-aside').classList.contains('hidden'), 'Expected detail aside hidden after toggle off');

        // Phase indicators should have buttons
        const phaseButtons = document.querySelectorAll('#phase-indicators [data-phase-target]');
        assert(phaseButtons.length === projectData.phases.length, 'Expected one phase button per phase');

        console.info('[status.html] tests: PASS');
      }

      function runTestsSafe() {
        try {
          runTests();
        } catch (err) {
          console.error('[status.html] tests: FAIL', err);
        }
      }

      function init() {
        if (DEMO_LOCK_ALL) {
          lockAllSteps();
          selectedStep = 'intake';
        }

        renderMindMap();
        renderPhaseIndicators();
        applyColors();
        renderDetailPanel();

        runTestsSafe();

        if (window.elementSdk) {
          try {
            window.elementSdk.init({
              defaultConfig,
              mapToCapabilities,
              mapToEditPanelValues,
              onConfigChange
            });
          } catch (err) {
            console.warn('Element SDK init failed (non-fatal):', err);
          }
        }
      }

      document.addEventListener('DOMContentLoaded', async () => {
        try {
          await initShell();
          init();

          // Click-away behavior: clicking outside a node or detail panel clears selection
          document.addEventListener('click', (e) => {
            const node = e.target.closest('.node-card');
            const detail = e.target.closest('.detail-panel');
            if (!node && !detail && selectedStep) {
              selectedStep = null;
              updateSelectedRings();
              renderDetailPanel();
            }
          });
        } catch (err) {
          console.error('Status init failed:', err);
        }
      });
    </script>
  </body>
</html>

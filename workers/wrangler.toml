name = "taxmonitor-pro-api"
main = "src/index.js"
compatibility_date = "2025-02-09"

# ---------------------------------------
# Routes
# ---------------------------------------

routes = [
  { pattern = "api.taxmonitor.pro/*", zone_name = "taxmonitor.pro" }
]

# ---------------------------------------
# Observability
# ---------------------------------------

[observability]
enabled = true

# ---------------------------------------
# R2 Buckets
# ---------------------------------------

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "taxmonitor-pro"

# ---------------------------------------
# Durable Object migrations
# (cleanup of old TokenLedger DO)
# ---------------------------------------

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TokenLedger"]

[[migrations]]
tag = "v2"
deleted_classes = ["TokenLedger"]

# ---------------------------------------
# Vars (non-secret)
# ---------------------------------------

[vars]


# canonical-wrangler.toml

```cs
name = "{{project_name}}"
main = "{{main_file_path}}"
compatibility_date = "{{compatibility_date}}"

# ---------------------------------------
# Routes
# ---------------------------------------

routes = [
  { pattern = "{{api_pattern}}", zone_name = "{{zone_name}}" }
]

# ---------------------------------------
# Observability
# ---------------------------------------

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

# ---------------------------------------
# Platform Bindings
# ---------------------------------------

[[r2_buckets]]
binding = "{{r2_binding}}"
bucket_name = "{{bucket_name}}"

# ---------------------------------------
# Durable Object migrations
# ---------------------------------------
# Uncomment only if/when VLP adds DO classes.

# [[migrations]]
# tag = "{{migration_tag_v1}}"
# new_sqlite_classes = ["{{new_class}}"]

# [[migrations]]
# tag = "{{migration_tag_v2}}"
# deleted_classes = ["{{deleted_class}}"]

# ---------------------------------------
# Vars (non-secret)
# ---------------------------------------

[vars]

# =================================================
# App
# =================================================

APP_BASE_URL = "{{app_base_url}}"
COOKIE_DOMAIN = "{{cookie_domain}}"
ENVIRONMENT = "{{environment}}"
MAGIC_LINK_EXPIRATION_MINUTES = "{{magic_link_expiration}}"
SESSION_TTL_SECONDS = "{{session_ttl}}"

# =================================================
# Auth
# =================================================

GOOGLE_CLIENT_ID = "{{google_client_id}}"
GOOGLE_REDIRECT_URI = "{{google_redirect_uri}}"

SSO_OIDC_CLIENT_ID = "{{sso_oidc_client_id}}"
SSO_OIDC_ISSUER = "{{sso_oidc_issuer}}"
SSO_OIDC_REDIRECT_URI = "{{sso_oidc_redirect_uri}}"

SSO_SAML_ACS_URL = "{{sso_saml_acs_url}}"
SSO_SAML_ENTITY_ID = "{{sso_saml_entity_id}}"
SSO_SAML_IDP_METADATA_URL = "{{sso_saml_idp_metadata_url}}"

TWOFA_TOKEN_EXPIRY_SECONDS = "{{twofa_token_expiry}}"
TWOFA_TOTP_ISSUER = "{{twofa_totp_issuer}}"

# =================================================
# Billing
# =================================================

BILLING_LINK_VA_STARTER_TRACK = "{{billing_link_va_starter_track}}"

STRIPE_PRICE_VLP_ADVANCED_MONTHLY = "{{stripe_price_vlp_advanced_monthly}}"
STRIPE_PRICE_VLP_ADVANCED_YEARLY = "{{stripe_price_vlp_advanced_yearly}}"
STRIPE_PRICE_VLP_PRO_MONTHLY = "{{stripe_price_vlp_pro_monthly}}"
STRIPE_PRICE_VLP_PRO_YEARLY = "{{stripe_price_vlp_pro_yearly}}"
STRIPE_PRICE_VLP_STARTER_MONTHLY = "{{stripe_price_vlp_starter_monthly}}"
STRIPE_PRICE_VLP_STARTER_YEARLY = "{{stripe_price_vlp_starter_yearly}}"

STRIPE_PRODUCT_VLP_ADVANCED = "{{stripe_product_vlp_advanced}}"
STRIPE_PRODUCT_VLP_PRO = "{{stripe_product_vlp_pro}}"
STRIPE_PRODUCT_VLP_STARTER = "{{stripe_product_vlp_starter}}"

STRIPE_PUBLISHABLE_KEY = "{{stripe_publishable_key}}"

VLP_ADVANCED_MONTHLY_COST = "{{vlp_advanced_monthly_cost}}"
VLP_ADVANCED_MONTHLY_PLAN_KEY = "{{vlp_advanced_monthly_plan_key}}"
VLP_ADVANCED_MONTHLY_PLATFORM_FEE_PERCENT = "{{vlp_advanced_monthly_platform_fee}}"
VLP_ADVANCED_MONTHLY_TAX_GAME_TOKENS = "{{vlp_advanced_monthly_tax_game_tokens}}"
VLP_ADVANCED_MONTHLY_TRANSCRIPT_TOKENS = "{{vlp_advanced_monthly_transcript_tokens}}"
VLP_ADVANCED_YEARLY_COST = "{{vlp_advanced_yearly_cost}}"
VLP_ADVANCED_YEARLY_PLAN_KEY = "{{vlp_advanced_yearly_plan_key}}"
VLP_ADVANCED_YEARLY_PLATFORM_FEE_PERCENT = "{{vlp_advanced_yearly_platform_fee}}"
VLP_ADVANCED_YEARLY_TAX_GAME_TOKENS = "{{vlp_advanced_yearly_tax_game_tokens}}"
VLP_ADVANCED_YEARLY_TRANSCRIPT_TOKENS = "{{vlp_advanced_yearly_transcript_tokens}}"

VLP_AVERAGE_MONTHLY_CLIENT_VALUE = "{{vlp_average_monthly_client_value}}"
VLP_PLATFORM_FEE_PERCENT = "{{vlp_platform_fee_percent}}"

VLP_PRO_MONTHLY_COST = "{{vlp_pro_monthly_cost}}"
VLP_PRO_MONTHLY_PLAN_KEY = "{{vlp_pro_monthly_plan_key}}"
VLP_PRO_MONTHLY_PLATFORM_FEE_PERCENT = "{{vlp_pro_monthly_platform_fee}}"
VLP_PRO_MONTHLY_TAX_GAME_TOKENS = "{{vlp_pro_monthly_tax_game_tokens}}"
VLP_PRO_MONTHLY_TRANSCRIPT_TOKENS = "{{vlp_pro_monthly_transcript_tokens}}"
VLP_PRO_YEARLY_COST = "{{vlp_pro_yearly_cost}}"
VLP_PRO_YEARLY_PLAN_KEY = "{{vlp_pro_yearly_plan_key}}"
VLP_PRO_YEARLY_PLATFORM_FEE_PERCENT = "{{vlp_pro_yearly_platform_fee}}"
VLP_PRO_YEARLY_TAX_GAME_TOKENS = "{{vlp_pro_yearly_tax_game_tokens}}"
VLP_PRO_YEARLY_TRANSCRIPT_TOKENS = "{{vlp_pro_yearly_transcript_tokens}}"

VLP_STARTER_MONTHLY_COST = "{{vlp_starter_monthly_cost}}"
VLP_STARTER_MONTHLY_PLAN_KEY = "{{vlp_starter_monthly_plan_key}}"
VLP_STARTER_MONTHLY_PLATFORM_FEE_PERCENT = "{{vlp_starter_monthly_platform_fee}}"
VLP_STARTER_MONTHLY_TAX_GAME_TOKENS = "{{vlp_starter_monthly_tax_game_tokens}}"
VLP_STARTER_MONTHLY_TRANSCRIPT_TOKENS = "{{vlp_starter_monthly_transcript_tokens}}"
VLP_STARTER_YEARLY_COST = "{{vlp_starter_yearly_cost}}"
VLP_STARTER_YEARLY_PLAN_KEY = "{{vlp_starter_yearly_plan_key}}"
VLP_STARTER_YEARLY_PLATFORM_FEE_PERCENT = "{{vlp_starter_yearly_platform_fee}}"
VLP_STARTER_YEARLY_TAX_GAME_TOKENS = "{{vlp_starter_yearly_tax_game_tokens}}"
VLP_STARTER_YEARLY_TRANSCRIPT_TOKENS = "{{vlp_starter_yearly_transcript_tokens}}"

# =================================================
# Calendar
# =================================================

CAL_APP_OAUTH_AUTHORIZE_URL = "{{cal_app_oauth_authorize_url}}"
CAL_APP_OAUTH_CLIENT_ID = "{{cal_app_oauth_client_id}}"
CAL_APP_OAUTH_REDIRECT_URI = "{{cal_app_oauth_redirect_uri}}"
CAL_APP_OAUTH_TOKEN_URL = "{{cal_app_oauth_token_url}}"

CAL_PRO_OAUTH_AUTHORIZE_URL = "{{cal_pro_oauth_authorize_url}}"
CAL_PRO_OAUTH_CLIENT_ID = "{{cal_pro_oauth_client_id}}"
CAL_PRO_OAUTH_REDIRECT_URI = "{{cal_pro_oauth_redirect_uri}}"
CAL_PRO_OAUTH_TOKEN_URL = "{{cal_pro_oauth_token_url}}"

# =================================================
# Cloudflare
# =================================================

CLOUDFLARE_ACCOUNT_ID = "{{cloudflare_account_id}}"
CLOUDFLARE_ZONE_ID = "{{cloudflare_zone_id}}"

# =================================================
# Messaging
# =================================================

GOOGLE_CLIENT_EMAIL = "{{google_client_email}}"
GOOGLE_TOKEN_URI = "{{google_token_uri}}"
GOOGLE_WORKSPACE_USER_INFO = "{{google_workspace_user_info}}"
GOOGLE_WORKSPACE_USER_NO_REPLY = "{{google_workspace_user_no_reply}}"
GOOGLE_WORKSPACE_USER_SUPPORT = "{{google_workspace_user_support}}"

TWILIO_ACCOUNT_SID = "{{twilio_account_sid}}"
TWILIO_PHONE_NUMBER = "{{twilio_phone_number}}"
TWILIO_VERIFY_SERVICE_SID = "{{twilio_verify_service_sid}}"

# =================================================
# Organization
# =================================================

MY_ORGANIZATION_ADDRESS = "{{organization_address}}"
MY_ORGANIZATION_BUSINESS_LOGO = "{{organization_business_logo}}"
MY_ORGANIZATION_CITY = "{{organization_city}}"
MY_ORGANIZATION_NAME = "{{organization_name}}"
MY_ORGANIZATION_STATE_PROVINCE = "{{organization_state_province}}"
MY_ORGANIZATION_ZIP = "{{organization_zip}}"

# =================================================
# Security
# =================================================

TURNSTILE_SITE_KEY = "{{turnstile_site_key}}"

# =================================================
# Storage / Internal
# =================================================

CANONICAL_BUCKET_NAME = "{{canonical_bucket_name}}"
CONTRACT_REGISTRY_PATH = "{{contract_registry_path}}"
WEBHOOK_REGISTRY_PATH = "{{webhook_registry_path}}"

# ---------------------------------------
# Secrets (set via wrangler secret put)
# ---------------------------------------

# =================================================
# Auth
# =================================================

# ENCRYPTION_KEY
# GOOGLE_CLIENT_SECRET
# JWT_SECRET
# SESSION_SECRET
# SSO_OIDC_CLIENT_SECRET
# TWOFA_ENCRYPTION_KEY

# =================================================
# Billing
# =================================================

# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET

# =================================================
# Calendar
# =================================================

# CAL_APP_OAUTH_CLIENT_SECRET
# CAL_PRO_OAUTH_CLIENT_SECRET
# CAL_WEBHOOK_SECRET

# =================================================
# Messaging
# =================================================

# GOOGLE_PRIVATE_KEY
# TWILIO_AUTH_TOKEN
# TWILIO_WEBHOOK_SECRET

# =================================================
# Security
# =================================================

# TURNSTILE_SECRET_KEY

# =================================================
# Storage / Internal
# =================================================

# R2_CANONICAL_WRITE_TOKEN

# =================================================
# Optional / Future Integrations
# =================================================

# OPENAI_API_KEY


```